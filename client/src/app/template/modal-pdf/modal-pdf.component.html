<div class="modal-header">
  @if (isLoaded) {
    <h4 class="modal-title" id="modal-basic-title">{{documentName}}{{pdfFile.nom}}</h4>
  }
  @if (!isLoaded) {
    <h4 class="modal-title" id="modal-basic-title">Ajouter un document</h4>
    }&nbsp;&nbsp;&nbsp;&nbsp;
    @if (!isLoaded) {
      <input type="file" (change)="loadFile($event)" accept=".pdf">
    }
    <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss()"></button>
  </div>
  <div class="modal-body modal-fullsize modalFullHeight">

    @if (isLoaded) {
      <div>
        <ngx-extended-pdf-viewer [src]="pdfFile.content"></ngx-extended-pdf-viewer>
      </div>
    }
    @if (isFailedPdf) {
      <div>
        <b>
          <font color="red">{{messagePdf}}</font>
        </b>
      </div>
    }
  </div>
  <div class="modal-footer">
    <a class="left" href="https://www.adobe.com/fr/acrobat/mobile/scanner-app.html" target="_blank">ADOBE scanner PDF</a>
    @if (isFailedPdf) {
      <button type="submit" class="btn btn-outline-secondary" disabled>Ajouter ce document</button>
    }
    @if (!isFailedPdf && isLoaded) {
      <button type="button" class="btn btn-primary"
      (click)="activeModal.close(pdfFile)">Ajouter ce document</button>
    }
  </div>
